<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VentasApp</title>
  
  <!-- Configuración PWA / Instalable -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- Tailwind CSS para Estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React y Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Usuarios iniciales
    const usuariosIniciales = [
      { id: 1, usuario: 'Sergio', clave: '1234', nombre: 'Sergio (Admin)', esAdmin: true },
      { id: 2, usuario: 'Kevin', clave: '1234', nombre: 'Kevin', esAdmin: false },
      { id: 3, usuario: 'Vendedor', clave: '1234', nombre: 'Vendedor Principal', esAdmin: false }
    ];

    function App() {
      // 1. Cargar lista de vendedores desde localStorage o usar la lista inicial
      const [vendedores, setVendedores] = useState(() => {
        const guardados = localStorage.getItem('vendedores');
        return guardados ? JSON.parse(guardados) : usuariosIniciales;
      });

      // 2. Cargar clientes almacenados
      const [clientes, setClientes] = useState(() => {
        const guardados = localStorage.getItem('clientes');
        return guardados ? JSON.parse(guardados) : [];
      });

      // 3. PERSISTENCIA DE SESIÓN: Cargar el usuario actualmente logueado
      const [usuarioActual, setUsuarioActual] = useState(() => {
        const sesionGuardada = localStorage.getItem('sesion_activa');
        return sesionGuardada ? JSON.parse(sesionGuardada) : null;
      });

      const [inputUser, setInputUser] = useState('');
      const [inputPass, setInputPass] = useState('');
      const [error, setError] = useState('');

      // Campos de nuevo cliente
      const [nombreCli, setNombreCli] = useState('');
      const [dirCli, setDirCli] = useState('');
      const [locCli, setLocCli] = useState('');
      const [busqueda, setBusqueda] = useState('');

      // Campos de nuevo vendedor (Admin)
      const [nuevoUser, setNuevoUser] = useState('');
      const [nuevaClave, setNuevaClave] = useState('');
      const [nuevoNombre, setNuevoNombre] = useState('');

      // Guardar cambios en localStorage cuando los datos cambien
      useEffect(() => {
        localStorage.setItem('vendedores', JSON.stringify(vendedores));
      }, [vendedores]);

      useEffect(() => {
        localStorage.setItem('clientes', JSON.stringify(clientes));
      }, [clientes]);

      // Guardar estado de la sesión activa para que no se cierre al actualizar
      useEffect(() => {
        if (usuarioActual) {
          localStorage.setItem('sesion_activa', JSON.stringify(usuarioActual));
        } else {
          localStorage.removeItem('sesion_activa');
        }
      }, [usuarioActual]);

      const handleLogin = (e) => {
        e.preventDefault();
        const user = vendedores.find(
          v => v.usuario.trim().toLowerCase() === inputUser.trim().toLowerCase() && v.clave === inputPass
        );
        if (user) {
          setUsuarioActual(user);
          setError('');
          setInputUser('');
          setInputPass('');
        } else {
          setError('Usuario o contraseña incorrectos');
        }
      };

      const handleLogout = () => {
        setUsuarioActual(null);
      };

      const guardarCliente = (e) => {
        e.preventDefault();
        if (!nombreCli || !dirCli || !locCli) return;
        const nuevo = {
          id: Date.now(),
          nombre: nombreCli,
          direccion: dirCli,
          localidad: locCli,
          vendedorId: usuarioActual.id
        };
        setClientes([...clientes, nuevo]);
        setNombreCli(''); setDirCli(''); setLocCli('');
      };

      const guardarVendedor = (e) => {
        e.preventDefault();
        if (!nuevoUser || !nuevaClave || !nuevoNombre) return;
        const nuevo = {
          id: Date.now(),
          usuario: nuevoUser,
          clave: nuevaClave,
          nombre: nuevoNombre,
          esAdmin: false
        };
        setVendedores([...vendedores, nuevo]);
        setNuevoUser(''); setNuevaClave(''); setNuevoNombre('');
      };

      const eliminarVendedor = (id) => {
        setVendedores(vendedores.filter(v => v.id !== id));
      };

      // Si no hay sesión iniciada, muestra el formulario de Login
      if (!usuarioActual) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-slate-800 p-6 rounded-2xl w-full max-w-sm border border-slate-700 shadow-xl space-y-4">
              <h1 className="text-xl font-bold text-center text-white">VentasApp Offline</h1>
              {error && <p className="text-xs text-red-400 text-center font-medium">{error}</p>}
              <form onSubmit={handleLogin} className="space-y-3">
                <input 
                  type="text" placeholder="Usuario" value={inputUser} onChange={e=>setInputUser(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500"
                />
                <input 
                  type="password" placeholder="Contraseña" value={inputPass} onChange={e=>setInputPass(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500"
                />
                <button className="w-full bg-indigo-600 hover:bg-indigo-500 font-semibold py-2.5 rounded-xl text-sm transition-colors">Ingresar</button>
              </form>
            </div>
          </div>
        );
      }

      // Filtrado de clientes según el rol
      const clientesVisibles = clientes.filter(c => {
        const coincideQuery = c.nombre.toLowerCase().includes(busqueda.toLowerCase()) || 
                             c.localidad.toLowerCase().includes(busqueda.toLowerCase()) ||
                             c.direccion.toLowerCase().includes(busqueda.toLowerCase());
        return usuarioActual.esAdmin ? coincideQuery : (coincideQuery && c.vendedorId === usuarioActual.id);
      });

      return (
        <div className="min-h-screen max-w-md mx-auto bg-slate-900 flex flex-col p-4 space-y-4">
          {/* Header Superior */}
          <div className="flex justify-between items-center border-b border-slate-800 pb-3">
            <div>
              <h2 className="font-bold text-white">{usuarioActual.nombre}</h2>
              <span className="text-xs text-indigo-400 font-medium">{usuarioActual.esAdmin ? 'Administrador' : 'Vendedor'}</span>
            </div>
            <button onClick={handleLogout} className="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-700 transition-colors">
              Cerrar Sesión
            </button>
          </div>

          {/* Vista de Administrador */}
          {usuarioActual.esAdmin ? (
            <div className="space-y-4">
              <h3 className="font-bold text-amber-400 text-sm">Panel de Administración de Vendedores</h3>
              <form onSubmit={guardarVendedor} className="bg-slate-800 p-3.5 rounded-xl space-y-2.5 border border-slate-700">
                <input type="text" placeholder="Nombre Completo" value={nuevoNombre} onChange={e=>setNuevoNombre(e.target.value)} className="w-full bg-slate-900 text-xs p-2.5 rounded-lg border border-slate-700 text-white"/>
                <input type="text" placeholder="Usuario" value={nuevoUser} onChange={e=>setNuevoUser(e.target.value)} className="w-full bg-slate-900 text-xs p-2.5 rounded-lg border border-slate-700 text-white"/>
                <input type="password" placeholder="Contraseña" value={nuevaClave} onChange={e=>setNuevaClave(e.target.value)} className="w-full bg-slate-900 text-xs p-2.5 rounded-lg border border-slate-700 text-white"/>
                <button className="w-full bg-amber-600 hover:bg-amber-500 text-xs font-bold py-2.5 rounded-lg transition-colors">Crear Nuevo Vendedor</button>
              </form>

              <h4 className="text-xs font-bold text-slate-400">Vendedores Registrados:</h4>
              <div className="space-y-2">
                {vendedores.map(v => (
                  <div key={v.id} className="bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between items-center text-xs">
                    <div>
                      <div className="font-bold text-white">{v.nombre}</div>
                      <div className="text-slate-400">Usuario: <span className="text-indigo-300">@{v.usuario}</span></div>
                    </div>
                    {!v.esAdmin && (
                      <button onClick={() => eliminarVendedor(v.id)} className="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded border border-red-500/30">
                        Eliminar
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </div>
          ) : (
            /* Vista de Vendedor */
            <div className="space-y-4">
              <h3 className="font-bold text-indigo-400 text-sm">Cargar Nuevo Cliente</h3>
              <form onSubmit={guardarCliente} className="bg-slate-800 p-3.5 rounded-xl space-y-2.5 border border-slate-700">
                <input type="text" placeholder="Nombre o Razón Social" value={nombreCli} onChange={e=>setNombreCli(e.target.value)} className="w-full bg-slate-900 text-xs p-2.5 rounded-lg border border-slate-700 text-white"/>
                <input type="text" placeholder="Dirección" value={dirCli} onChange={e=>setDirCli(e.target.value)} className="w-full bg-slate-900 text-xs p-2.5 rounded-lg border border-slate-700 text-white"/>
                <input type="text" placeholder="Localidad" value={locCli} onChange={e=>setLocCli(e.target.value)} className="w-full bg-slate-900 text-xs p-2.5 rounded-lg border border-slate-700 text-white"/>
                <button className="w-full bg-indigo-600 hover:bg-indigo-500 text-xs font-bold py-2.5 rounded-lg transition-colors">Guardar Cliente</button>
              </form>

              <div className="space-y-2">
                <h4 className="text-xs font-bold text-slate-400">Clientes Registrados:</h4>
                <input type="text" placeholder="Buscar por nombre, localidad o dirección..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} className="w-full bg-slate-800 text-xs p-2.5 rounded-xl border border-slate-700 text-white"/>
                
                <div className="space-y-2 pt-1">
                  {clientesVisibles.length === 0 ? (
                    <div className="text-center text-xs text-slate-500 py-4">No hay clientes guardados aún.</div>
                  ) : (
                    clientesVisibles.map(c => (
                      <div key={c.id} className="bg-slate-800 p-3 rounded-xl border border-slate-700 space-y-1">
                        <div className="font-bold text-xs text-white">{c.nombre}</div>
                        <div className="text-[11px] text-slate-400">📍 {c.direccion} - <strong className="text-indigo-300">{c.localidad}</strong></div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
